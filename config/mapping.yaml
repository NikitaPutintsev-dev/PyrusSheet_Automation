  - { column: "E", id: 29, type: text }
  - { column: "F", id: 6, type: date }
  - { column: "G", id: 7, type: text }
  - { column: "H", id: 8, type: number }
  - { column: "I", id: 34, type: text }
  - { column: "J", id: 10, type: number }
  - { column: "K", id: 11, type: text }
  - { column: "L", id: 13, type: text }
  - { column: "M", id: 31, type: text }
  - { column: "P", id: 35, type: text }
  - { column: "Q", id: 22, type: text }

task_options:
  subject_template: "Согласование платежей г.Ульяновск: {K} | №{G} | {F}"
  participants_column: "B"

logging:
  log_sheet_name: "Лог Pyrus"